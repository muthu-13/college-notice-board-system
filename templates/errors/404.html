{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="error-container" style="text-align: center; padding: 50px; min-height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <div class="error-content" style="max-width: 600px;">
        <i class="fas fa-exclamation-triangle" style="font-size: 80px; color: #f39c12; margin-bottom: 20px;"></i>
        <h1 style="font-size: 72px; margin: 20px 0; color: #e74c3c;">404</h1>
        <h2 style="margin: 20px 0;">Page Not Found</h2>
        <p style="color: #7f8c8d; margin: 20px 0; font-size: 18px;">
            The page you are looking for doesn't exist or has been moved.
        </p>
        <div style="margin-top: 30px;">
            <a href="{{ url_for('index') }}" class="btn btn-primary" style="margin: 5px;">
                <i class="fas fa-home"></i> Go to Home
            </a>
            {% if session.get('user_id') %}
            <a href="{{ url_for('home') }}" class="btn btn-secondary" style="margin: 5px;">
                <i class="fas fa-dashboard"></i> Dashboard
            </a>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
